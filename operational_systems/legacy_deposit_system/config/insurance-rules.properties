# ============================================================
# Insurance Rules Configuration
# WARNING: SMDIA and other limits should be sourced from
# regulatory parameter tables, not hardcoded properties files.
#
# KNOWN ISSUES:
#   - SMDIA hardcoded (should be configurable for regulatory changes)
#   - EBP limit per-plan instead of per-participant
#   - Pending codes incomplete (5 of 10 required)
#   - Processing deadline not enforced
#   - IRR ORC not in supported list
# ============================================================

# Standard Maximum Deposit Insurance Amount
# Per 12 CFR Part 330 — $250,000 per depositor per ORC
insurance.smdia=250000.00

# Supported ORC types
# BUG: Missing IRR (Irrevocable Trust) — 12 CFR 330.13
insurance.supported.orc.types=SGL,JNT,REV,BUS,EBP,CRA,GOV1,GOV2,GOV3,ANC

# EBP Coverage
# BUG: Per-plan limit instead of per-participant pass-through
# 12 CFR 330.14 requires pass-through coverage per participant
insurance.ebp.limit=250000.00
insurance.ebp.mode=PER_PLAN

# Processing deadline per 12 CFR 370.3(b)
insurance.processing.max.hours=24
insurance.processing.target.hours=8
# BUG: Estimated time is 18 hours — dangerously close to limit
insurance.processing.estimated.hours=18

# Output file configuration
# BUG: Delimiter should be pipe (|) per FDIC spec
output.delimiter=,
output.encoding=UTF-8
output.qdf.version=2.0
output.are.version=1.0
output.max.records.per.file=1000000
# BUG: No checksum generation configured
output.generate.checksum=false
# BUG: No PII encryption for output files
output.encrypt.pii=false

# Pending reason codes
# BUG: Only P01-P05 defined. IT Guide requires P01-P10.
pending.code.P01=Missing beneficiary information
pending.code.P02=Incomplete account documentation
pending.code.P03=Unresolved joint ownership dispute
pending.code.P04=Missing trust document
pending.code.P05=Government deposit collateral unverified
# MISSING: P06-P10

# Data source refresh intervals
datasource.core.banking.refresh.hours=24
datasource.trust.system.refresh.hours=24
datasource.ira.system.refresh.hours=24
# BUG: Government deposits sourced manually — no auto-refresh
datasource.government.refresh.mode=MANUAL

# Security settings
security.data.at.rest.encrypted=true
# BUG: Data in transit NOT encrypted for internal batch transfers
security.data.in.transit.encrypted=false
security.pii.masking.enabled=true
security.audit.logging=true
