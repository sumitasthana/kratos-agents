# Wire Transfer System Configuration
# ============================================================================
# KNOWN ISSUES (FDIC Part 370 / 12 CFR 330):
#   1. SMDIA limit hardcoded — should reference FDIC published schedule
#   2. OFAC screening mode is BATCH — regulatory expectation is REAL_TIME
#   3. Processing estimate 14hrs exceeds 80% of 24-hour deadline
#   4. PII encryption disabled for output files
#   5. Delimiter is comma — FDIC spec requires pipe
#   6. Missing ORC types: IRR, ANC not configured
#   7. SDN list update frequency weekly — should be daily minimum
# ============================================================================

# ── Institution Identity ───────────────────────────────────────────
institution.name=Covered Institution
institution.fdic_cert=99999
institution.charter_type=NATIONAL
institution.regulator=OCC

# ── Wire Transfer Channels ────────────────────────────────────────
wire.channels.fedwire.enabled=true
wire.channels.fedwire.endpoint=https://fedwire.frb.gov/api/v2
wire.channels.fedwire.timeout_ms=30000
wire.channels.swift.enabled=true
wire.channels.swift.bic=COVDUS33XXX
wire.channels.ach.enabled=true
wire.channels.ach.odfi_id=999999999
wire.channels.book_transfer.enabled=true

# ── OFAC/Sanctions Screening ──────────────────────────────────────
ofac.screening.mode=BATCH
# BUG: Should be REAL_TIME for wire transfers
ofac.screening.sdn_list.update_frequency=WEEKLY
# BUG: Should be DAILY minimum, ideally REAL_TIME
ofac.screening.match_threshold=85
# BUG: 85% too low — produces excessive false positives
ofac.screening.lists=SDN
# BUG: Missing EU_SANCTIONS, UK_OFSI, UN_CONSOLIDATED
ofac.screening.fuzzy_matching=false
# BUG: No fuzzy matching — transliterated names missed

# ── Insurance Calculation ──────────────────────────────────────────
insurance.smdia=250000
insurance.calculation_mode=PER_TRANSACTION
# BUG: Should be AGGREGATED_BY_DEPOSITOR_ORC
insurance.orc_types.supported=SGL,JNT,REV,BUS,EBP,CRA,GOV1,GOV2,GOV3
# BUG: Missing IRR (irrevocable trust) and ANC (annuity)
insurance.jnt.split_method=EQUAL
# BUG: Should be ACTUAL_INTEREST per 12 CFR 330.9
insurance.ebp.calc_method=FLAT
# BUG: Should be PER_PARTICIPANT per 12 CFR 330.14
insurance.rev.max_beneficiaries=5
# BUG: No limit per FDIC rules — each named beneficiary gets $250K
insurance.gov.collateral_check=false
# BUG: Government deposits require collateral assessment

# ── Processing Configuration ──────────────────────────────────────
processing.max_hours=24
processing.target_hours=8
processing.estimated_hours=14
# BUG: 14hrs is 58% of deadline — too close for comfort
processing.batch_size=25000
processing.parallel_threads=8
processing.include_pending=false
# BUG: Pending wires excluded from insurance balance

# ── Output Configuration ──────────────────────────────────────────
output.format=CSV
output.delimiter=,
# BUG: Should be pipe (|) per FDIC QDF specification
output.include_header=true
output.encrypt_pii=false
# BUG: PII must be encrypted in output files
output.checksum.enabled=false
# BUG: Checksum required for file integrity verification
output.qdf.filename_pattern=QDF_WIRE_{DATE}.csv
output.are.filename_pattern=ARE_WIRE_{DATE}.csv

# ── Data Security ──────────────────────────────────────────────────
security.encryption.at_rest=AES-256
security.encryption.in_transit=TLS_1_2
# NOTE: Transit encryption is better than legacy system (which had NONE)
security.pii.masking=false
# BUG: PII should be masked in logs and non-essential displays
security.audit.retention_years=7
# BUG: Regulatory requirement is 10 years minimum

# ── Database ───────────────────────────────────────────────────────
db.host=prod-wire-db.internal
db.port=5432
db.name=wire_ledger
db.pool.min=5
db.pool.max=20
