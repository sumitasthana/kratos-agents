# Trust & Custody System Configuration
# ============================================================================
# KNOWN ISSUES (FDIC Part 370 / 12 CFR 330):
#   1. SMDIA hardcoded — should reference FDIC published schedule
#   2. REV beneficiary cap at 5 — FDIC removed this limit in 2010
#   3. IRR calculation method set to SGL_FALLBACK — not implemented
#   4. EBP participant source is PLAN_HEADER not ROSTER
#   5. Custodial accounts all treated as SGL
#   6. No grantor aggregation enabled
#   7. Sub-account rollup disabled — trust totals incomplete
#   8. PII encryption disabled for output files
#   9. Delimiter is comma — FDIC spec requires pipe
#  10. Death notification frequency is MONTHLY — should be DAILY
# ============================================================================

# ── Institution Identity ───────────────────────────────────────────
institution.name=Covered Institution
institution.fdic_cert=99999
institution.charter_type=NATIONAL

# ── Trust Types Supported ──────────────────────────────────────────
trust.types.supported=REV,IRR,EBP,CUS
# BUG: Missing GOV (government trust), CRA types

# ── Insurance Calculation Rules ────────────────────────────────────
insurance.smdia=250000
insurance.rev.beneficiary_cap=5
# BUG: FDIC removed the 5-beneficiary cap in 2010 — should be UNLIMITED
insurance.rev.count_method=PRIMARY_ONLY
# BUG: Should count ALL named beneficiaries (PRIMARY + CONTINGENT + REMAINDER)
insurance.rev.include_deceased=true
# BUG: Deceased beneficiaries should be EXCLUDED from coverage count

insurance.irr.calculation_method=SGL_FALLBACK
# BUG: Should be PER_NON_CONTINGENT_INTEREST per 12 CFR 330.13
insurance.irr.implemented=false

insurance.ebp.participant_source=PLAN_HEADER
# BUG: Should be INDIVIDUAL_ROSTER with vesting check
insurance.ebp.include_terminated=true
# BUG: Terminated participants should be EXCLUDED
insurance.ebp.include_non_vested=true
# BUG: Non-vested participants should be EXCLUDED

insurance.custodial.default_orc=SGL
# BUG: Should determine underlying type (IRA→IRR, UTMA→SGL in minor's name)

# ── Aggregation ────────────────────────────────────────────────────
aggregation.grantor_level.enabled=false
# BUG: Must aggregate by grantor across trusts — same grantor + same bene = one limit
aggregation.cross_channel.enabled=false
# BUG: Trust balances should be combined with deposit system balances
aggregation.sub_account_rollup.enabled=false
# BUG: CDs and savings under trust umbrella not included in trust total

# ── Processing Configuration ──────────────────────────────────────
processing.max_hours=24
processing.target_hours=10
processing.estimated_hours=16
# BUG: 16hrs is 67% of deadline — high risk of overrun
processing.batch_size=5000
processing.death_notification_frequency=MONTHLY
# BUG: Should be DAILY for timely REV→IRR reclassification

# ── Output Configuration ──────────────────────────────────────────
output.format=CSV
output.delimiter=,
# BUG: Should be pipe (|) per FDIC QDF specification
output.encrypt_pii=false
# BUG: Grantor SSN, beneficiary SSN exposed in plaintext
output.checksum.enabled=false
# BUG: File integrity checksum required
output.qdf.filename=QDF_TRUST_{DATE}.csv
output.are.filename=ARE_TRUST_{DATE}.csv

# ── Data Security ──────────────────────────────────────────────────
security.encryption.at_rest=AES-256
security.encryption.in_transit=NONE
# BUG: No encryption in transit — trust data contains sensitive PII
security.pii.masking=false
security.audit.retention_years=7
# BUG: Should be 10 years minimum per regulatory requirement

# ── Database ───────────────────────────────────────────────────────
db.host=prod-trust-db.internal
db.port=1433
db.name=trust_db
db.pool.min=3
db.pool.max=10
